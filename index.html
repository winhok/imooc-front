<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      type="text/javascript"
      charset="utf-8"
      src="https://connect.qq.com/qc_jssdk.js"
      data-appid="101998494"
      data-redirecturi="https://imooc-front.lgdsunday.club/login"
    ></script>
    <script>
      try {
        const preference = localStorage.getItem('imooc-front:theme')
        const prefersDark = window.matchMedia(
          '(prefers-color-scheme: dark)'
        ).matches
        document.documentElement.classList.toggle(
          'dark',
          preference === 'dark' || (preference !== 'light' && prefersDark)
        )
      } catch {
        document.documentElement.classList.toggle(
          'dark',
          window.matchMedia('(prefers-color-scheme: dark)').matches
        )
      }
    </script>
    <title>前中台解决方案</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="app-overlays"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
