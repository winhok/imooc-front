map $uri $imooc_front_cache_control {
    default "no-cache";
    ~^/assets/ "public, max-age=31536000, immutable";
    ~^/prod-api/ "";
}

server {
    listen 80;
    listen [::]:80;
    server_name imooc-front.lgdsunday.club;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name imooc-front.lgdsunday.club;

    root /var/www/imooc-front/dist;
    index index.html;
    charset utf-8;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/imooc-front.lgdsunday.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imooc-front.lgdsunday.club/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    gzip on;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types application/javascript application/json image/svg+xml text/css text/plain;

    add_header Cache-Control $imooc_front_cache_control always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;

    location /assets/ {
        try_files $uri =404;
    }

    location /prod-api/ {
        proxy_pass https://api.imooc-front.lgdsunday.club/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name api.imooc-front.lgdsunday.club;
        proxy_set_header Host api.imooc-front.lgdsunday.club;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
