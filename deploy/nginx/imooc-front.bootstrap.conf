server {
    listen 80;
    listen [::]:80;
    server_name imooc-front.lgdsunday.club;

    root /var/www/imooc-front/current;
    index index.html;
    charset utf-8;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
